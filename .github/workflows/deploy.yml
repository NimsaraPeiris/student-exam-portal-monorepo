name: CI/CD Pipeline

on:
  push:
    branches: [main] # Trigger on push to main
  pull_request:
    branches: [main] # Run tests on PRs, but skip deploy 

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Turborepo to compare changes

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm 10
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected packages
        # Only build what changed since the last commit
        run: pnpm turbo build --filter='[HEAD^1]' 

      - name: Run affected tests
        # Fail the build if any test fails
        run: pnpm turbo test --filter='[HEAD^1]' 

      - name: Deploy affected Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Pass the filter correctly to catch only services [cite: 174, 180]
        run: pnpm turbo deploy --filter='[HEAD^1]' --filter='./services/*'
        env:
          # This MUST match the name in your turbo.json 'env' array 
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}